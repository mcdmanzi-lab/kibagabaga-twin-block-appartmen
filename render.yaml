services:
  - type: static
    name: kibagabaga-booking
    rootDir: .
    buildCommand: npm ci --prefer-offline --no-audit && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
    routes:
      - path: /
        filePath: dist/index.html
      - path: /*
        filePath: dist/index.html
    autoDeploy: true
